[build]
builder = "NIXPACKS"

[deploy]
startCommand = "php artisan migrate --force && php artisan storage:link && php artisan optimize"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 2
healthcheckPath = "/up"
healthcheckTimeout = 30
sleepFor = 0

[env]
APP_ENV = "production"
APP_DEBUG = "false"
APP_URL = "${{ Railway.PublicDomain }}"
DB_CONNECTION = "mysql"
DB_HOST = "${{ Railway.Database.Host }}"
DB_PORT = "${{ Railway.Database.Port }}"
DB_DATABASE = "${{ Railway.Database.Database }}"
DB_USERNAME = "${{ Railway.Database.User }}"
DB_PASSWORD = "${{ Railway.Database.Password }}"

[variables]
# Railway variables will be set in dashboard
